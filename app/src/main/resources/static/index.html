<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Zarządzania DevOps</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-login { background: #3498db; color: white; border: 1px solid #2980b9; }
        .btn-register { background: #2ecc71; color: white; border: 1px solid #27ae60; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Witaj w Systemie!</h1>
        <p>Zaloguj się, aby uzyskać dostęp do panelu monitoringu lub załóż nowe konto.</p>
        <a href="/dashboard.html" class="btn btn-login">Zaloguj się</a>
        <a href="/register.html" class="btn btn-register">Załóż konto</a>
    </div>
</body>
</html>
