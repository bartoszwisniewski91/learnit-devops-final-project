version: '3.8'
services:
  app:
    image: ${DOCKERHUB_USERNAME}/devops-app:latest
    ports:
      - "8080:8080"
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus