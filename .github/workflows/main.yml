name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app  # Ścieżka do folderu z pom.xml i kodem
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, ubuntu] # GitHub wyśle to zadanie do Twojego Ubuntu!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: |
          # Tworzymy folder na aplikację, jeśli nie istnieje
          mkdir -p ~/app
          # Kopiujemy pliki konfiguracyjne do folderu app
          cp docker-compose.yml ~/app/
          cp -r monitoring/ ~/app/ 2>/dev/null || true
          
          cd ~/app
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          
          # Pobieramy najnowszy obraz i restartujemy kontenery
          docker compose pull
          docker compose up -d

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p ~/app
            cd ~/app
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            sudo docker-compose pull
            sudo docker-compose up -d

      