name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # ETAP 1: Budowanie i wysyłka obrazu (robi to GitHub w chmurze)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  # ETAP 2: Wdrożenie (wykonuje Twój serwer Ubuntu przez Runnera)
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, ubuntu]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: |
          # 1. Przygotowanie katalogu roboczego
          mkdir -p ~/app
          
          # 2. Skopiowanie plików (z repozytorium do folderu aplikacji)
          cp docker-compose.yml ~/app/
          # Kopiujemy monitoring tylko jeśli folder istnieje
          [ -d "monitoring" ] && cp -r monitoring/ ~/app/ || echo "No monitoring folder found"
          
          # 3. Uruchomienie aplikacji
          cd ~/app
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          
          docker compose pull
          docker compose up -d

      - name: Send Discord Notification
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 Deployment status: ${{ job.status }} na serwerze Ubuntu!\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"