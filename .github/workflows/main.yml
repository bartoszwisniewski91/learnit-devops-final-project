name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        env:
          # To wymusza przekazanie zmiennej do każdej komendy w tym kroku
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }} 
        run: |
          mkdir -p ~/app
          cp docker-compose.yml ~/app/
          [ -d "monitoring" ] && cp -r monitoring/ ~/app/ || echo "No monitoring folder"
          
          cd ~/app
          # Tworzymy plik .env na serwerze "w locie" - to najpewniejsza metoda
          echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" > .env
          
          docker compose pull
          docker compose up -d --force-recreate